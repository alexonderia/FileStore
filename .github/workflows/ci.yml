name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l $(find . -type f -name '*.go' -not -path './.git/*'))"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Start integration dependencies
        run: docker compose up -d --wait postgres seaweedfs
      - name: Real PostgreSQL and SeaweedFS integration
        env:
          FILESTORE_TEST_DATABASE_URL: postgres://filestore:filestore-local@localhost:5432/filestore?sslmode=disable
          FILESTORE_TEST_S3_ENDPOINT: http://localhost:8333
        run: go test -count=1 ./tests/integration ./tests/e2e
      - name: Build
        run: go build ./cmd/filestore-api ./cmd/filestore

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint OpenAPI
        run: npx --yes @redocly/cli@1.34.3 lint openapi/openapi.yaml
