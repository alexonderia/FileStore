services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-filestore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filestore-local}
      POSTGRES_DB: ${POSTGRES_DB:-filestore}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - filestore-postgres:/var/lib/postgresql/data

volumes:
  filestore-postgres:
